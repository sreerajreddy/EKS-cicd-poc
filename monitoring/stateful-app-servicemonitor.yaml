apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: stateful-app-sm
  namespace: monitoring
  labels:
    release: kube-prom-stack
spec:
  namespaceSelector:
    matchNames:
      - apps
  selector:
    matchLabels:
      app: stateful-app
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
